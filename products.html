<html lang="en">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">ShopHub</a>
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="products.html">Products</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cart.html">Cart</a>
                    </li>
                </ul>
            </div>
        </div>

        <div class="row">
            <!-- Products will be dynamically inserted here -->
             <div class="col-md-3">
                <img src="filter.jpg" class="mb-3" width="100%">

                <label class="mt-3">Category</label>
                <select class="form-select">
                    <option>All</option>
                    <option>Electronics</option>
                    <option>Shoes</option>
                    <option>Fashion</option>
                </select>

                <select class="form-select">    
                    <option>All</option>
                    <option>₹200- ₹500</option>
                    <option>₹500 - ₹1000</option>
                    <option>₹1000 - ₹2000</option>

                </div>
