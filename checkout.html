<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">ShopHub</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
           </div>
           </nav>
           <div class="container my-5">
            <div class="row">
                <div class="col-md-5">
                    <h3>Order Summary</h3>
                    <div id="orderSummary"></div>
                    <h4 class="mt-4">Total: ₹<span id="orderTotal">0</span></h4>
                </div>
            <div class="col-md-7">
                <h3>Shipping Information</h3>
                <form id="checkoutForm">
                    <div class="mb-3">
                        <label for="Full Name" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="name" required>
                    </div>
                    <div class="mb-3">
                        <label for="Email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="Phone Number" class="form-label">Phone Number</label>
                        <input type="tel" class="form-control" id="phone" required>
                    </div>
                    <div class="mb-3">
                        <label for="Address" class="form-label">Address</label>
                        <textarea class="form-control" id="address" rows="3" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="city" class="form-label">City</label>
                        <input type="text" class="form-control" id="city" required>
                    </div>
                    <div class="mb-3">
                        <label for="state" class="form-label">State</label>
                        <input type="text" class="form-control" id="state" required>
                    </div>
                    <div class="mb-3">
                        <label for="Pin Code" class="form-label">Pin Code</label>
                        <input type="text" class="form-control" id="pinCode" required>
                    </div>
                    <button type="submit" class="btn btn-success">Place Order</button>
                </form>
           </div>
            </div>
              </div>
              <script src="checkout.js"></script>
</body>
</html>
