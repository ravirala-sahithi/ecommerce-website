<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container my-5">
        <h1 class="text-center">Search Products</h1>
        <div class="row mt-5">
            <div class="col-md-8 offset-md-2">
                <form id="search-form">
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" id="search-query" placeholder="Search for products..." aria-label="Search for products" aria-describedby="search-button">
                        <button class="btn btn-primary" type="submit" id="search-button">Search</button>
                    </div>
                </form>
                <div id="search-results" class="mt-4">
                    <!-- Search results will be displayed here -->
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery-3.7.1.min.js"></script>
    <script src="search.js"></script>
    </body>
</html>
